let currentLang = 'ja';
let lastInputs = null; // {A, B} cached for re-render on lang change

// =========================================================================
// 1) テキスト処理ユーティリティ
// =========================================================================

function escapeChar(s) {
    return s.replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/'/g, '&#39;')
            .replace(/"/g, '&quot;');
}

function splitText(text) {
    text = text.replace(/\r/g, '');
    text = text.replace(/\n/g, '<$>');
    const tokens = [];
    const re = /[a-z]+|<\$>|&#?\w+;|[\s\S]/g;
    let m;
    while ((m = re.exec(text)) !== null) {
        tokens.push(m[0]);
    }
    return tokens;
}

function countChar(text) {
    const wcount = (text.match(/\S+/g) || []).length;
    let t = text.replace(/\r/g, '');
    // 本家difff.jpに合わせて、末尾に暗黙の改行があるものとして扱う（空文字列のときは加算しない）。
    // これにより「改行数」は実質的に行数（末尾改行を含む）になる。
    if (t !== '') t += '\n';
    const count3 = Array.from(t).length;  // 改行込み文字数
    t = t.replace(/\n/g, '');
    const count2 = Array.from(t).length;  // 空白込み文字数（改行は除く）
    t = t.replace(/\s/g, '');
    const count1 = Array.from(t).length;  // 純粋な文字数
    return [count1, count2, count3, wcount];
}

// =========================================================================
// 2) 差分計算（GNU diff -d アルゴリズムの忠実な移植）
// =========================================================================
//
// 本セクションは GNU diffutils の analyze.c（compareseq / diag /
// shift_boundaries）と normal.c の出力ロジックを JavaScript に移植したもの。
// オリジナルの difff.pl が外部コマンド `diff -d` を呼び出していた処理を、
// ブラウザ内で同一アルゴリズムにより再現する。
//
// difff では「1トークン（単語・文字・改行）」を「1行」とみなして diff にかける。
// したがって本実装は行（=トークン）の配列を直接受け取り、GNU diff の normal 形式
// 文字列（例: "2c2", "5,7d4", "3a4,6"）を返す。これを difff.pl と同じ正規表現
// ロジックで解釈し、<em> ハイライトを埋め込む。
//
// -d（--minimal）相当で速度ヒューリスティックは無効。出力は常に最小編集距離。

// --- GNU compareseq / diag（双方向 middle-snake、minimal）---
// xkeys, ykeys: 比較対象の配列（difffではトークン配列）
// 戻り値: { changedA: bool[], changedB: bool[] }
function gnuMyersChanged(xkeys, ykeys) {
    const N = xkeys.length, M = ykeys.length;
    // キーを整数コードに変換（GNUの equivs 相当。比較を整数一致にする）
    const codeMap = new Map();
    let next = 1;
    const xv = new Int32Array(N), yv = new Int32Array(M);
    for (let i = 0; i < N; i++) { let c = codeMap.get(xkeys[i]); if (c === undefined) { c = next++; codeMap.set(xkeys[i], c); } xv[i] = c; }
    for (let i = 0; i < M; i++) { let c = codeMap.get(ykeys[i]); if (c === undefined) { c = next++; codeMap.set(ykeys[i], c); } yv[i] = c; }

    const changedA = new Array(N).fill(false);
    const changedB = new Array(M).fill(false);

    const diags = N + M + 3;
    const fdiag = new Int32Array(2 * diags + 4);
    const bdiag = new Int32Array(2 * diags + 4);
    const foff = M + 2, boff = M + 2;
    const FD = (d) => fdiag[foff + d], SFD = (d, v) => { fdiag[foff + d] = v; };
    const BD = (d) => bdiag[boff + d], SBD = (d, v) => { bdiag[boff + d] = v; };

    function diag(xoff, xlim, yoff, ylim, part) {
        const dmin = xoff - ylim, dmax = xlim - yoff;
        const fmid = xoff - yoff, bmid = xlim - ylim;
        let fmin = fmid, fmax = fmid, bmin = bmid, bmax = bmid;
        const odd = ((fmid - bmid) & 1) !== 0;
        SFD(fmid, xoff); SBD(bmid, xlim);
        for (let c = 1; ; c++) {
            if (fmin > dmin) SFD(--fmin - 1, -1); else ++fmin;
            if (fmax < dmax) SFD(++fmax + 1, -1); else --fmax;
            for (let d = fmax; d >= fmin; d -= 2) {
                let tlo = FD(d - 1), thi = FD(d + 1);
                let x = (tlo >= thi) ? tlo + 1 : thi;
                let y = x - d;
                while (x < xlim && y < ylim && xv[x] === yv[y]) { x++; y++; }
                SFD(d, x);
                if (odd && bmin <= d && d <= bmax && BD(d) <= x) { part.xmid = x; part.ymid = y; return; }
            }
            if (bmin > dmin) SBD(--bmin - 1, 0x7fffffff); else ++bmin;
            if (bmax < dmax) SBD(++bmax + 1, 0x7fffffff); else --bmax;
            for (let d = bmax; d >= bmin; d -= 2) {
                let tlo = BD(d - 1), thi = BD(d + 1);
                let x = (tlo < thi) ? tlo : thi - 1;
                let y = x - d;
                while (x > xoff && y > yoff && xv[x - 1] === yv[y - 1]) { x--; y--; }
                SBD(d, x);
                if (!odd && fmin <= d && d <= fmax && x <= FD(d)) { part.xmid = x; part.ymid = y; return; }
            }
            // minimal=true のためヒューリスティックは使用しない
        }
    }

    function compareseq(xoff, xlim, yoff, ylim) {
        while (xoff < xlim && yoff < ylim && xv[xoff] === yv[yoff]) { xoff++; yoff++; }
        while (xlim > xoff && ylim > yoff && xv[xlim - 1] === yv[ylim - 1]) { xlim--; ylim--; }
        if (xoff === xlim) {
            while (yoff < ylim) changedB[yoff++] = true;
        } else if (yoff === ylim) {
            while (xoff < xlim) changedA[xoff++] = true;
        } else {
            const part = { xmid: 0, ymid: 0 };
            diag(xoff, xlim, yoff, ylim, part);
            compareseq(xoff, part.xmid, yoff, part.ymid);
            compareseq(part.xmid, xlim, part.ymid, ylim);
        }
    }

    compareseq(0, N, 0, M);
    return { changedA, changedB };
}

// --- GNU analyze.c shift_boundaries（変更領域を末尾方向へ寄せ、隣接ハンクを併合）---
function gnuShiftBoundaries(equivs, changed, otherChanged) {
    const i_end = equivs.length;
    const ch = (arr, idx) => (idx < 0 || idx >= arr.length ? false : arr[idx]);
    let i = 0, j = 0;
    while (true) {
        let runlength, start, corresponding;
        while (i < i_end && !changed[i]) {
            while (ch(otherChanged, j)) j++;
            j++;
            i++;
        }
        if (i === i_end) break;
        start = i;
        i++;
        while (ch(changed, i)) i++;
        while (ch(otherChanged, j)) j++;
        do {
            runlength = i - start;
            while (start > 0 && equivs[start - 1] === equivs[i - 1]) {
                changed[--start] = true;
                changed[--i] = false;
                while (ch(changed, start - 1)) start--;
                j--;
                while (ch(otherChanged, j)) j--;
            }
            corresponding = ch(otherChanged, j - 1) ? i : i_end;
            while (i !== i_end && equivs[start] === equivs[i]) {
                changed[start++] = false;
                changed[i++] = true;
                while (ch(changed, i)) i++;
                j++;
                while (ch(otherChanged, j)) { corresponding = i; j++; }
            }
        } while (runlength !== i - start);
        while (corresponding < i) {
            changed[--start] = true;
            changed[--i] = false;
            j--;
            while (ch(otherChanged, j)) j--;
        }
    }
}

// --- GNU build_script（changed フラグから編集スクリプトを生成）---
function gnuBuildScript(N, M, changed0, changed1) {
    const ch = (arr, idx) => (idx >= 0 && idx < arr.length ? arr[idx] : false);
    const script = [];
    let i0 = 0, i1 = 0;
    while (i0 < N || i1 < M) {
        if (ch(changed0, i0) || ch(changed1, i1)) {
            const line0 = i0, line1 = i1;
            while (ch(changed0, i0)) i0++;
            while (ch(changed1, i1)) i1++;
            script.push({ line0, line1, deleted: i0 - line0, inserted: i1 - line1 });
        }
        i0++; i1++;
    }
    return script;
}

// --- GNU normal.c 出力（a/d/c コマンド + < / > 行）---
// tokensA, tokensB: トークン配列。戻り値は diff の normal 形式文字列。
//
// difff.pl はトークンを join("\n", @tokens) . "\n" でファイル化して diff にかける。
// この結果、トークン配列が空のときファイルは "\n"（空行が1行）になり、
// diff から見れば「1行のファイル」として扱われる。この意味論を再現するため、
// 空配列のときは [''] （空文字列1行）として比較する。
function gnuDiffNormal(tokensA, tokensB) {
    const linesA = tokensA.length === 0 ? [''] : tokensA;
    const linesB = tokensB.length === 0 ? [''] : tokensB;
    const { changedA, changedB } = gnuMyersChanged(linesA, linesB);
    // shift_boundaries は f=0, f=1 の順に適用（equivs として元の配列を使用）
    gnuShiftBoundaries(linesA, changedA, changedB);
    gnuShiftBoundaries(linesB, changedB, changedA);
    const script = gnuBuildScript(linesA.length, linesB.length, changedA, changedB);

    const rng = (start, count) => { const f = start + 1, l = start + count; return f === l ? '' + f : f + ',' + l; };
    let out = '';
    for (const h of script) {
        const f0 = h.line0, f1 = h.line1;
        const left = h.deleted ? rng(f0, h.deleted) : String(f0);
        const right = h.inserted ? rng(f1, h.inserted) : String(f1);
        let cmd;
        if (h.deleted && h.inserted) cmd = left + 'c' + right;
        else if (h.deleted) cmd = left + 'd' + right;
        else cmd = left + 'a' + right;
        out += cmd + '\n';
        for (let d = 0; d < h.deleted; d++) out += '< ' + linesA[f0 + d] + '\n';
        if (h.deleted && h.inserted) out += '---\n';
        for (let s = 0; s < h.inserted; s++) out += '> ' + linesB[f1 + s] + '\n';
    }
    return out;
}

// =========================================================================
// 2b) difff.pl 互換：diff -d の normal 出力を解釈して <em> を埋め込む
// =========================================================================
//
// オリジナル difff.pl の処理を忠実に移植：
//   1. diff -d の出力から、コマンド行（2c2 等）と改行トークン行（<$>）を抽出
//   2. c/d/a コマンドの行番号に対応するトークンを <em>...</em> で囲む
//   3. 「> <$>」「< <$>」（改行トークンの増減）を見て左右の行数を <$><$> で揃える
//   4. <em> が <$>（行）をまたぐ場合は </em><$><em> に分割
//   5. <td> ごとに分割し、行末の空白を可視化（&nbsp;）

function escapeSpace(s) {
    return s.replace(/\s/g, '&nbsp;');
}

// トークン配列 a_split / b_split（escape_char + split_text 済み）と
// それらに対する diff -d normal 出力から、行ペア配列 [[aHtml,bHtml],...] を返す。
function buildRowsFromTokens(a_split, b_split, normalDiff) {
    // ※ a_split / b_split はこの関数内で破壊的に書き換える（difff.pl と同様）
    a_split = a_split.slice();
    b_split = b_split.slice();

    // @diffsummary = grep /(^[^<>-]|<$>)/
    const diffsummary = normalDiff.split('\n').filter(l => /(^[^<>-]|<\$>)/.test(l));

    let a_start = 0, a_end = 0, b_start = 0, b_end = 0;
    for (const line of diffsummary) {
        let mm;
        if ((mm = line.match(/^((\d+),)?(\d+)c(\d+)(,(\d+))?$/))) {        // 置換
            a_end = parseInt(mm[3]) || 0; a_start = (mm[2] ? parseInt(mm[2]) : 0) || a_end;
            b_start = parseInt(mm[4]) || 0; b_end = (mm[6] ? parseInt(mm[6]) : 0) || b_start;
            a_split[a_start - 1] = '<em>' + (a_split[a_start - 1] ?? '');
            a_split[a_end - 1] = (a_split[a_end - 1] ?? '') + '</em>';
            b_split[b_start - 1] = '<em>' + (b_split[b_start - 1] ?? '');
            b_split[b_end - 1] = (b_split[b_end - 1] ?? '') + '</em>';
        } else if ((mm = line.match(/^((\d+),)?(\d+)d(\d+)(,(\d+))?$/))) { // 欠失
            a_end = parseInt(mm[3]) || 0; a_start = (mm[2] ? parseInt(mm[2]) : 0) || a_end;
            b_start = parseInt(mm[4]) || 0; b_end = (mm[6] ? parseInt(mm[6]) : 0) || b_start;
            a_split[a_start - 1] = '<em>' + (a_split[a_start - 1] ?? '');
            a_split[a_end - 1] = (a_split[a_end - 1] ?? '') + '</em>';
        } else if ((mm = line.match(/^((\d+),)?(\d+)a(\d+)(,(\d+))?$/))) { // 挿入
            a_end = parseInt(mm[3]) || 0; a_start = (mm[2] ? parseInt(mm[2]) : 0) || a_end;
            b_start = parseInt(mm[4]) || 0; b_end = (mm[6] ? parseInt(mm[6]) : 0) || b_start;
            b_split[b_start - 1] = '<em>' + (b_split[b_start - 1] ?? '');
            b_split[b_end - 1] = (b_split[b_end - 1] ?? '') + '</em>';
        } else if (/> <\$>/.test(line)) {   // B側に改行トークン挿入 → A側の行数を揃える
            let i = (a_start > 1) ? a_start - 2 : 0;
            while (i < a_split.length && !/<\$>/.test(a_split[i])) i++;
            if (i < a_split.length) a_split[i] = a_split[i].replace('<$>', '<$><$>');
        } else if (/< <\$>/.test(line)) {   // A側で改行トークン欠失 → B側の行数を揃える
            let i = (b_start > 1) ? b_start - 2 : 0;
            while (i < b_split.length && !/<\$>/.test(b_split[i])) i++;
            if (i < b_split.length) b_split[i] = b_split[i].replace('<$>', '<$><$>');
        }
    }

    let a_final = a_split.join('');
    let b_final = b_split.join('');

    // 変更箇所が <td>（行）をまたぐ場合、</em><$><em> に分割
    let prev;
    do { prev = a_final; a_final = a_final.replace(/(<em>[^<>]*)<\$>(([^<>]|<\$>)*<\/em>)/g, '$1</em><$><em>$2'); } while (a_final !== prev);
    do { prev = b_final; b_final = b_final.replace(/(<em>[^<>]*)<\$>(([^<>]|<\$>)*<\/em>)/g, '$1</em><$><em>$2'); } while (b_final !== prev);

    const a_rows = a_final.split('<$>');
    const b_rows = b_final.split('<$>');
    const par = Math.max(a_rows.length, b_rows.length);
    const rows = [];
    for (let i = 0; i < par; i++) {
        let ar = a_rows[i] ?? '';
        let br = b_rows[i] ?? '';
        // 行末（</em> 直前）の空白を可視化
        ar = ar.replace(/( +<\/em>)/g, m => escapeSpace(m));
        br = br.replace(/( +<\/em>)/g, m => escapeSpace(m));
        rows.push([ar, br]);
    }
    return rows;
}

// =========================================================================
// 3) 結果テーブルのレンダリング
// =========================================================================

// 入力サイズの警告しきい値（トークン数）。これを超えると確認ダイアログを出す。
// 計算自体はWorker内で行われUIは固まらないため、ユーザーが中断ボタンで止められる前提。
const WARN_TOKENS = 100000;

// 現在実行中のWorker（中断用）。
let activeWorker = null;

// GNU diff -d の計算本体（gnuMyersChanged / gnuShiftBoundaries / gnuBuildScript /
// gnuDiffNormal）をWorker内でも使えるようにBlob URL化する。
// 関数本体を文字列化して、Worker側で同じ関数を再定義する。
// Worker側ではトークン配列を受け取り、normal形式のdiff文字列を返す。
let workerBlobUrl = null;
function getWorkerBlobUrl() {
    if (workerBlobUrl) return workerBlobUrl;
    const workerSource = `
'use strict';
${gnuMyersChanged.toString()}
${gnuShiftBoundaries.toString()}
${gnuBuildScript.toString()}
${gnuDiffNormal.toString()}
self.onmessage = function(e) {
    try {
        const normalDiff = gnuDiffNormal(e.data.a, e.data.b);
        self.postMessage({ ok: true, normalDiff: normalDiff });
    } catch (err) {
        self.postMessage({ ok: false, error: String(err) });
    }
};
`;
    const blob = new Blob([workerSource], { type: 'application/javascript' });
    workerBlobUrl = URL.createObjectURL(blob);
    return workerBlobUrl;
}

// Worker経由でdiff計算を行う。
// 中断可能。返り値はPromise<normalDiff文字列>。中断された場合はrejectされる。
function diffTokensAsync(tokensA, tokensB) {
    return new Promise((resolve, reject) => {
        const worker = new Worker(getWorkerBlobUrl());
        activeWorker = worker;
        worker.onmessage = (e) => {
            activeWorker = null;
            worker.terminate();
            if (e.data.ok) resolve(e.data.normalDiff);
            else reject(new Error(e.data.error));
        };
        worker.onerror = (e) => {
            activeWorker = null;
            worker.terminate();
            reject(new Error(e.message || 'worker error'));
        };
        worker.postMessage({ a: tokensA, b: tokensB });
    });
}

function cancelDiff() {
    if (activeWorker) {
        activeWorker.terminate();
        activeWorker = null;
        return true;
    }
    return false;
}

// 「計算中...」表示のためのトークン。比較ボタンを押すたびにインクリメントし、
// 古いPromiseが遅れて完了しても結果を捨てられるようにする。
let currentRunToken = 0;

async function renderResult(seqA, seqB) {
    const t = I18N[currentLang];
    const resultDiv = document.getElementById('result');
    const newsDiv = document.getElementById('news');

    // 入力されたら新着情報は隠す（オリジナルと同じ挙動）
    newsDiv.style.display = 'none';

    lastInputs = { A: seqA, B: seqB };

    const tokensA = splitText(escapeChar(seqA));
    const tokensB = splitText(escapeChar(seqB));

    if (tokensA.length > WARN_TOKENS || tokensB.length > WARN_TOKENS) {
        if (!window.confirm(t.confirmLargeFmt(tokensA.length, tokensB.length, WARN_TOKENS))) {
            return;
        }
    }

    // 前回の計算が走っていれば中断
    cancelDiff();

    // この実行のトークンを発行
    const myToken = ++currentRunToken;

    // 計算中表示（中断ボタン付き）
    resultDiv.innerHTML = `<p class="controls">${t.computing} <input type="button" id="cancelBtn" value="${t.cancelBtn}"></p>`;
    const cancelBtn = document.getElementById('cancelBtn');
    if (cancelBtn) {
        cancelBtn.onclick = () => {
            if (cancelDiff()) {
                if (myToken === currentRunToken) {
                    resultDiv.innerHTML = `<p class="err">${t.cancelled}</p>`;
                }
            }
        };
    }

    // Worker経由で計算（diff -d の normal 形式文字列を取得）
    let normalDiff;
    try {
        normalDiff = await diffTokensAsync(tokensA, tokensB);
    } catch (err) {
        // この実行が最新でなければ何もしない（別の比較が始まっている）
        if (myToken !== currentRunToken) return;
        // まだ「計算中…」表示のままなら、Worker内エラーとして表示する
        // （terminateによる中断はcancelBtnハンドラで既に表示更新済み）
        if (resultDiv.querySelector('#cancelBtn')) {
            resultDiv.innerHTML = `<p class="err">計算エラー: ${err.message || err}</p>`;
        }
        return;
    }

    // この間に別の比較が開始されていたら、結果は破棄
    if (myToken !== currentRunToken) return;

    const rows = buildRowsFromTokens(tokensA, tokensB, normalDiff);

    let html = '<table cellspacing="0"><tbody>';
    for (const [a, b] of rows) {
        html += `<tr><td>${a}</td><td>${b}</td></tr>`;
    }

    const [c1A, c2A, c3A, wcA] = countChar(seqA);
    const [c1B, c2B, c3B, wcB] = countChar(seqB);
    const cl = t.countLabels;
    const fmtCounts = (c1, c2, c3, wc) =>
        `${cl.chars}: ${c1}<br>` +
        `${cl.spaces}: ${c2 - c1} ${cl.charsWithSpaces}: ${c2}<br>` +
        `${cl.newlines}: ${c3 - c2} ${cl.charsWithNewlines}: ${c3}<br>` +
        `${cl.words}: ${wc}`;
    html += `<tr>
        <td><span class="gray">${fmtCounts(c1A, c2A, c3A, wcA)}</span></td>
        <td><span class="gray">${fmtCounts(c1B, c2B, c3B, wcB)}</span></td>
    </tr></tbody></table>`;

    html += `
    <p class="controls">
        <input type="button" id="hideBtn" value="${t.hideBtn}">
        |
        <input type="radio" name="color" value="1" checked id="color1"><label for="color1"><span class="blue">${t.color1}</span></label>
        <input type="radio" name="color" value="2" id="color2"><label for="color2"><span class="green">${t.color2}</span></label>
        <input type="radio" name="color" value="3" id="color3"><label for="color3"><span class="black">${t.color3}</span></label>
        |
        <input type="button" id="saveBtn" value="${t.saveBtn}">
    </p>`;

    resultDiv.innerHTML = html;
    attachResultHandlers();
}

function attachResultHandlers() {
    const hideBtn = document.getElementById('hideBtn');
    if (hideBtn) hideBtn.onclick = toggleForm;
    const c1 = document.getElementById('color1');
    const c2 = document.getElementById('color2');
    const c3 = document.getElementById('color3');
    if (c1) c1.onclick = () => setColor('blue');
    if (c2) c2.onclick = () => setColor('green');
    if (c3) c3.onclick = () => setColor('black');
    const sb = document.getElementById('saveBtn');
    if (sb) sb.onclick = saveAsHtml;
}

function setColor(cls) {
    const colorMap = { blue: '#00BBFF', green: '#00bb00', black: 'black' };
    document.getElementById('top').style.borderTop = `5px solid ${colorMap[cls]}`;
    document.querySelectorAll('em').forEach(el => { el.className = cls; });
}

function toggleForm() {
    const t = I18N[currentLang];
    const ids = ['top', 'form', 'news', 'footer'];
    const btn = document.getElementById('hideBtn');
    const isHidden = document.getElementById('top').style.display === 'none';
    ids.forEach(id => {
        const el = document.getElementById(id);
        if (el && !(id === 'news' && el.dataset.alreadyHidden === '1')) {
            el.style.display = isHidden ? '' : 'none';
        }
    });
    // newsは比較実行後にもともと隠れているので、印刷モード解除時にも隠したままにする
    if (isHidden) {
        const news = document.getElementById('news');
        if (news && document.getElementById('result').innerHTML.trim()) {
            news.style.display = 'none';
        }
    }
    if (btn) btn.value = isHidden ? t.hideBtn : t.showBtn;
}

function saveAsHtml() {
    const taA = document.getElementById('sequenceA');
    const taB = document.getElementById('sequenceB');
    taA.textContent = taA.value;
    taB.textContent = taB.value;
    ['color1', 'color2', 'color3'].forEach(id => {
        const r = document.getElementById(id);
        if (r) {
            if (r.checked) r.setAttribute('checked', 'checked');
            else r.removeAttribute('checked');
        }
    });
    const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'difff_' + new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-') + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// =========================================================================
// 4) 言語切替
// =========================================================================

function setLang(lang) {
    if (lang !== 'ja' && lang !== 'en') return;
    const prevLang = currentLang;
    currentLang = lang;
    const t = I18N[lang];

    document.getElementById('htmlRoot').setAttribute('lang', lang);
    document.title = t.pageTitle;
    document.getElementById('pageTitle').textContent = t.pageTitle;
    document.getElementById('titleLink').textContent = t.title;
    document.getElementById('verText').textContent = t.ver;
    document.getElementById('prevVerLink').textContent = t.prevVer;
    document.getElementById('instructionText').textContent = t.instruction;
    document.getElementById('compareBtn').value = t.compareBtn;

    // 言語切替リンク
    const switchEl = document.getElementById('langSwitch');
    if (lang === 'ja') {
        switchEl.innerHTML = '<a href="#" data-action="lang-en">English</a> | Japanese';
    } else {
        switchEl.innerHTML = 'English | <a href="#" data-action="lang-ja">Japanese</a>';
    }

    // 新着情報リスト
    renderNewsList();

    // フッター
    document.getElementById('footerContent').innerHTML = t.footerHTML();

    // サンプルテキスト：旧言語のサンプルそのままだった場合のみ差し替え
    const taA = document.getElementById('sequenceA');
    const taB = document.getElementById('sequenceB');
    const prev = I18N[prevLang];
    if (taA.value === prev.sampleA && taB.value === prev.sampleB) {
        taA.value = t.sampleA;
        taB.value = t.sampleB;
    }

    // 結果が表示中の場合は再レンダリング（カウントラベル等を更新するため）
    const resultDiv = document.getElementById('result');
    if (resultDiv.innerHTML.trim() && lastInputs) {
        renderResult(lastInputs.A, lastInputs.B);
    }
}

function renderNewsList() {
    const t = I18N[currentLang];
    document.getElementById('newsTitle').textContent = t.newsTitle;
    const ul = document.getElementById('newsList');
    ul.innerHTML = t.news.map(item => `<li>${item}</li>`).join('');
}

// ニュース内の言語切替リンク等のイベント委譲
document.addEventListener('click', (e) => {
    const a = e.target.closest('a[data-action]');
    if (!a) return;
    const action = a.getAttribute('data-action');
    if (action === 'lang-en') { e.preventDefault(); setLang('en'); }
    else if (action === 'lang-ja') { e.preventDefault(); setLang('ja'); }
});

// =========================================================================
// 5) 初期化
// =========================================================================

window.addEventListener('DOMContentLoaded', () => {
    // 保存ファイルから開いた場合、html lang属性で初期言語を判定
    const htmlLang = document.getElementById('htmlRoot').getAttribute('lang');
    currentLang = (htmlLang === 'en') ? 'en' : 'ja';

    const taA = document.getElementById('sequenceA');
    const taB = document.getElementById('sequenceB');

    // 既に内容がある場合は上書きしない（保存ファイル復元用）
    if (!taA.value.trim() && !taB.value.trim()) {
        taA.value = I18N[currentLang].sampleA;
        taB.value = I18N[currentLang].sampleB;
    }

    // UI言語を適用
    setLang(currentLang);

    document.getElementById('compareBtn').onclick = () => {
        renderResult(taA.value, taB.value);
    };

    // 保存ファイル復元時：resultが既にあればハンドラ再アタッチ＋news非表示
    const result = document.getElementById('result');
    if (result.innerHTML.trim()) {
        attachResultHandlers();
        document.getElementById('news').style.display = 'none';
    }
});
</script>
