let currentLang = 'ja';
let lastInputs = null; // {A, B} cached for re-render on lang change

// =========================================================================
// 1) テキスト処理ユーティリティ
// =========================================================================

function escapeChar(s) {
    return s.replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/'/g, '&#39;')
            .replace(/"/g, '&quot;');
}

function splitText(text) {
    text = text.replace(/\r/g, '');
    text = text.replace(/\n/g, '<$>');
    const tokens = [];
    const re = /[a-z]+|<\$>|&#?\w+;|[\s\S]/g;
    let m;
    while ((m = re.exec(text)) !== null) {
        tokens.push(m[0]);
    }
    return tokens;
}

function visibleTrailingSpaces(html) {
    return html.replace(/( +)<\/em>/g, (_, sp) => sp.replace(/ /g, '&nbsp;') + '</em>');
}

function countChar(text) {
    const wcount = (text.match(/\S+/g) || []).length;
    let t = text.replace(/\r/g, '');
    const count3 = Array.from(t).length;
    t = t.replace(/\n/g, '');
    const count2 = Array.from(t).length;
    t = t.replace(/\s/g, '');
    const count1 = Array.from(t).length;
    return [count1, count2, count3, wcount];
}

// =========================================================================
// 2) 差分計算（LCSベース）
// =========================================================================

function diffTokens(a, b) {
    const n = a.length, m = b.length;
    if (n === 0) return b.map(t => ({ type: 'insert', token: t }));
    if (m === 0) return a.map(t => ({ type: 'delete', token: t }));
    const dp = new Array(n + 1);
    dp[0] = new Uint32Array(m + 1);
    for (let i = 1; i <= n; i++) {
        const row = new Uint32Array(m + 1);
        const prev = dp[i - 1];
        for (let j = 1; j <= m; j++) {
            if (a[i - 1] === b[j - 1]) row[j] = prev[j - 1] + 1;
            else { const u = prev[j], l = row[j - 1]; row[j] = u > l ? u : l; }
        }
        dp[i] = row;
    }
    const ops = [];
    let i = n, j = m;
    while (i > 0 && j > 0) {
        if (a[i - 1] === b[j - 1]) { ops.push({ type: 'keep', token: a[i - 1] }); i--; j--; }
        else if (dp[i - 1][j] >= dp[i][j - 1]) { ops.push({ type: 'delete', token: a[i - 1] }); i--; }
        else { ops.push({ type: 'insert', token: b[j - 1] }); j--; }
    }
    while (i > 0) { ops.push({ type: 'delete', token: a[i - 1] }); i--; }
    while (j > 0) { ops.push({ type: 'insert', token: b[j - 1] }); j--; }
    return ops.reverse();
}

function buildRows(ops) {
    let aBuf = '', bBuf = '';
    let inEmA = false, inEmB = false;
    const rows = [];
    const closeA = () => { if (inEmA) { aBuf += '</em>'; inEmA = false; } };
    const closeB = () => { if (inEmB) { bBuf += '</em>'; inEmB = false; } };
    for (const op of ops) {
        const tok = op.token;
        const isNL = (tok === '<$>');
        if (op.type === 'keep') {
            closeA(); closeB();
            if (isNL) { rows.push([aBuf, bBuf]); aBuf = ''; bBuf = ''; }
            else { aBuf += tok; bBuf += tok; }
        } else if (op.type === 'delete') {
            closeB();
            if (isNL) { closeA(); rows.push([aBuf, bBuf]); aBuf = ''; bBuf = ''; }
            else { if (!inEmA) { aBuf += '<em>'; inEmA = true; } aBuf += tok; }
        } else {
            closeA();
            if (isNL) { closeB(); rows.push([aBuf, bBuf]); aBuf = ''; bBuf = ''; }
            else { if (!inEmB) { bBuf += '<em>'; inEmB = true; } bBuf += tok; }
        }
    }
    closeA(); closeB();
    rows.push([aBuf, bBuf]);
    for (let i = 0; i < rows.length; i++) {
        rows[i][0] = visibleTrailingSpaces(rows[i][0]);
        rows[i][1] = visibleTrailingSpaces(rows[i][1]);
    }
    return rows;
}

// =========================================================================
// 3) 結果テーブルのレンダリング
// =========================================================================

const MAX_TOKENS = 5000;

function renderResult(seqA, seqB) {
    const t = I18N[currentLang];
    const resultDiv = document.getElementById('result');
    const newsDiv = document.getElementById('news');

    // 入力されたら新着情報は隠す（オリジナルと同じ挙動）
    newsDiv.style.display = 'none';

    lastInputs = { A: seqA, B: seqB };

    const tokensA = splitText(escapeChar(seqA));
    const tokensB = splitText(escapeChar(seqB));

    if (tokensA.length > MAX_TOKENS || tokensB.length > MAX_TOKENS) {
        resultDiv.innerHTML = `<p class="err">${t.errTooLargeFmt(tokensA.length, tokensB.length, MAX_TOKENS)}</p>`;
        return;
    }

    const ops = diffTokens(tokensA, tokensB);
    const rows = buildRows(ops);

    let html = '<table class="result" cellspacing="0"><tbody>';
    for (const [a, b] of rows) {
        html += `<tr><td>${a}</td><td>${b}</td></tr>`;
    }

    const [c1A, c2A, c3A, wcA] = countChar(seqA);
    const [c1B, c2B, c3B, wcB] = countChar(seqB);
    const cl = t.countLabels;
    const fmtCounts = (c1, c2, c3, wc) =>
        `${cl.chars}: ${c1}<br>` +
        `${cl.spaces}: ${c2 - c1}　${cl.charsWithSpaces}: ${c2}<br>` +
        `${cl.newlines}: ${c3 - c2}　${cl.charsWithNewlines}: ${c3}<br>` +
        `${cl.words}: ${wc}`;
    html += `<tr>
        <td><span class="gray">${fmtCounts(c1A, c2A, c3A, wcA)}</span></td>
        <td><span class="gray">${fmtCounts(c1B, c2B, c3B, wcB)}</span></td>
    </tr></tbody></table>`;

    html += `
    <p class="controls">
        <input type="button" id="hideBtn" value="${t.hideBtn}">
        |
        <input type="radio" name="color" value="1" checked id="color1"><label for="color1"><span class="blue">${t.color1}</span></label>
        <input type="radio" name="color" value="2" id="color2"><label for="color2"><span class="green">${t.color2}</span></label>
        <input type="radio" name="color" value="3" id="color3"><label for="color3"><span class="black">${t.color3}</span></label>
        |
        <input type="button" id="saveBtn" value="${t.saveBtn}">
    </p>`;

    resultDiv.innerHTML = html;
    attachResultHandlers();
}

function attachResultHandlers() {
    const hideBtn = document.getElementById('hideBtn');
    if (hideBtn) hideBtn.onclick = toggleForm;
    const c1 = document.getElementById('color1');
    const c2 = document.getElementById('color2');
    const c3 = document.getElementById('color3');
    if (c1) c1.onclick = () => setColor('blue');
    if (c2) c2.onclick = () => setColor('green');
    if (c3) c3.onclick = () => setColor('black');
    const sb = document.getElementById('saveBtn');
    if (sb) sb.onclick = saveAsHtml;
}

function setColor(cls) {
    const colorMap = { blue: '#00BBFF', green: '#00bb00', black: 'black' };
    document.getElementById('top').style.borderTop = `5px solid ${colorMap[cls]}`;
    document.querySelectorAll('em').forEach(el => { el.className = cls; });
}

function toggleForm() {
    const t = I18N[currentLang];
    const ids = ['top', 'form', 'news', 'footer'];
    const btn = document.getElementById('hideBtn');
    const isHidden = document.getElementById('top').style.display === 'none';
    ids.forEach(id => {
        const el = document.getElementById(id);
        if (el && !(id === 'news' && el.dataset.alreadyHidden === '1')) {
            el.style.display = isHidden ? '' : 'none';
        }
    });
    // newsは比較実行後にもともと隠れているので、印刷モード解除時にも隠したままにする
    if (isHidden) {
        const news = document.getElementById('news');
        if (news && document.getElementById('result').innerHTML.trim()) {
            news.style.display = 'none';
        }
    }
    if (btn) btn.value = isHidden ? t.hideBtn : t.showBtn;
}

function saveAsHtml() {
    const taA = document.getElementById('sequenceA');
    const taB = document.getElementById('sequenceB');
    taA.textContent = taA.value;
    taB.textContent = taB.value;
    ['color1', 'color2', 'color3'].forEach(id => {
        const r = document.getElementById(id);
        if (r) {
            if (r.checked) r.setAttribute('checked', 'checked');
            else r.removeAttribute('checked');
        }
    });
    const html = '<!DOCTYPE html>\n' + document.documentElement.outerHTML;
    const blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'difff_' + new Date().toISOString().slice(0, 19).replace(/[:T]/g, '-') + '.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

// =========================================================================
// 4) 言語切替
// =========================================================================

function setLang(lang) {
    if (lang !== 'ja' && lang !== 'en') return;
    const prevLang = currentLang;
    currentLang = lang;
    const t = I18N[lang];

    document.getElementById('htmlRoot').setAttribute('lang', lang);
    document.title = t.pageTitle;
    document.getElementById('pageTitle').textContent = t.pageTitle;
    document.getElementById('titleLink').textContent = t.title;
    document.getElementById('verText').textContent = t.ver;
    document.getElementById('prevVerLink').textContent = t.prevVer;
    document.getElementById('instructionText').textContent = t.instruction;
    document.getElementById('compareBtn').value = t.compareBtn;

    // 言語切替リンク
    const switchEl = document.getElementById('langSwitch');
    if (lang === 'ja') {
        switchEl.innerHTML = '<a href="#" data-action="lang-en">English</a> | Japanese';
    } else {
        switchEl.innerHTML = 'English | <a href="#" data-action="lang-ja">Japanese</a>';
    }

    // 新着情報リスト
    renderNewsList();

    // フッター
    document.getElementById('footerContent').innerHTML = t.footerHTML();

    // サンプルテキスト：旧言語のサンプルそのままだった場合のみ差し替え
    const taA = document.getElementById('sequenceA');
    const taB = document.getElementById('sequenceB');
    const prev = I18N[prevLang];
    if (taA.value === prev.sampleA && taB.value === prev.sampleB) {
        taA.value = t.sampleA;
        taB.value = t.sampleB;
    }

    // 結果が表示中の場合は再レンダリング（カウントラベル等を更新するため）
    const resultDiv = document.getElementById('result');
    if (resultDiv.innerHTML.trim() && lastInputs) {
        renderResult(lastInputs.A, lastInputs.B);
    }
}

function renderNewsList() {
    const t = I18N[currentLang];
    document.getElementById('newsTitle').textContent = t.newsTitle;
    const ul = document.getElementById('newsList');
    ul.innerHTML = t.news.map(item => `<li>${item}</li>`).join('');
}

// ニュース内の言語切替リンク等のイベント委譲
document.addEventListener('click', (e) => {
    const a = e.target.closest('a[data-action]');
    if (!a) return;
    const action = a.getAttribute('data-action');
    if (action === 'lang-en') { e.preventDefault(); setLang('en'); }
    else if (action === 'lang-ja') { e.preventDefault(); setLang('ja'); }
});

// =========================================================================
// 5) 初期化
// =========================================================================

window.addEventListener('DOMContentLoaded', () => {
    // 保存ファイルから開いた場合、html lang属性で初期言語を判定
    const htmlLang = document.getElementById('htmlRoot').getAttribute('lang');
    currentLang = (htmlLang === 'en') ? 'en' : 'ja';

    const taA = document.getElementById('sequenceA');
    const taB = document.getElementById('sequenceB');

    // 既に内容がある場合は上書きしない（保存ファイル復元用）
    if (!taA.value.trim() && !taB.value.trim()) {
        taA.value = I18N[currentLang].sampleA;
        taB.value = I18N[currentLang].sampleB;
    }

    // UI言語を適用
    setLang(currentLang);

    document.getElementById('compareBtn').onclick = () => {
        renderResult(taA.value, taB.value);
    };

    // 保存ファイル復元時：resultが既にあればハンドラ再アタッチ＋news非表示
    const result = document.getElementById('result');
    if (result.innerHTML.trim()) {
        attachResultHandlers();
        document.getElementById('news').style.display = 'none';
    }
});
</script>
